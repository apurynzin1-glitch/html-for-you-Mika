<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Someone Special</title>
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #0b0e14;
            --card-bg: #161b22;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Анимированный фон как в современных IDE */
        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: move 10s linear infinite;
            z-index: 0;
            top: -50%;
        }

        @keyframes move {
            from { transform: perspective(500px) rotateX(60deg) translateY(0); }
            to { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .card {
            position: relative;
            z-index: 10;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00f2ff, #007bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #typing-text {
            font-size: 1.1rem;
            line-height: 1.6;
            min-height: 100px;
            color: #c9d1d9;
            margin-bottom: 30px;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 20px var(--accent);
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.2rem;
            background: var(--accent);
            margin-left: 5px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="grid"></div>

    <div class="card">
        <h1 id="title">System.out.println("HBD!");</h1>
        <div id="typing-text"></div>
        <button class="btn" onclick="startSurprise()">Нажми сюда</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        // Текст поздравления (отредактируй под себя)
        const text = "С днем рождения! 🎂 За этот месяц общения ты стала для меня очень приятным открытием. Пусть твой личный 'код жизни' работает без багов, а каждый новый день приносит только крутые обновления и яркие эмоции! ✨";
        
        let i = 0;
        const speed = 50;
        const target = document.getElementById("typing-text");

        function typeWriter() {
            if (i < text.length) {
                target.innerHTML = text.substring(0, i+1) + '<span class="cursor"></span>';
                i++;
                setTimeout(typeWriter, speed);
            } else {
                target.innerHTML = text + '<span class="cursor"></span>';
            }
        }

        // Запуск печати при загрузке
        window.onload = () => {
            setTimeout(typeWriter, 1000);
        };

        function startSurprise() {
            // Эффект конфетти
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#00f2ff', '#007bff']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#00f2ff', '#007bff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
            
            document.getElementById("title").innerText = "Success! 🎉";
        }
    </script>
</body>
</html>
